<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gewicht · Wochenübersicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #151917;
    --surface2: #1c1f1d;
    --border: #252825;
    --text: #e8ede9;
    --muted: #5a6359;
    --green: #4ade80;
    --green-dim: #1a3326;
    --red: #f87171;
    --red-dim: #2d1a1a;
    --accent: #a3e635;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 48px;
  }

  header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header span {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .upload-zone {
    margin: 24px 16px;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--accent);
    background: #161a14;
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 32px;
    margin-bottom: 10px;
  }

  .upload-zone p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .upload-zone p strong {
    color: var(--accent);
    font-weight: 600;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 0 16px 20px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 12px;
    border: 1px solid var(--border);
  }

  .stat-card .label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .stat-card .value.good { color: var(--green); }
  .stat-card .value.neutral { color: var(--text); }

  .section-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0 16px;
    margin-bottom: 10px;
  }

  .week-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 16px;
  }

  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .week-badge {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    min-width: 52px;
  }

  .week-badge .kw-label {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .week-badge .kw-num {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  .week-badge .kw-year {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: block;
    margin-top: 1px;
  }

  .week-info .avg-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 3px;
  }

  .week-info .avg-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .week-info .days-count {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 4px;
  }

  .delta-badge {
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    min-width: 64px;
  }

  .delta-badge.loss {
    background: var(--green-dim);
  }

  .delta-badge.gain {
    background: var(--red-dim);
  }

  .delta-badge.neutral {
    background: var(--surface2);
  }

  .delta-badge .delta-label {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .delta-badge .delta-value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    font-family: 'DM Mono', monospace;
  }

  .delta-badge.loss .delta-value { color: var(--green); }
  .delta-badge.gain .delta-value { color: var(--red); }
  .delta-badge.neutral .delta-value { color: var(--muted); }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    display: none;
  }

  #results { display: none; }

  .trend-bar-wrap {
    margin: 0 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    overflow: hidden;
  }

  .trend-bar-wrap h3 {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
  }

  .chart-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }

  .chart-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--accent);
    opacity: 0.7;
    min-height: 3px;
    transition: height 0.5s ease;
  }

  .chart-label {
    font-size: 8px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<header>
  <h1>Gewicht</h1>
  <span>Wochenübersicht</span>
</header>

<div class="upload-zone" id="dropzone">
  <input type="file" id="fileInput" accept=".csv">
  <div class="upload-icon">📂</div>
  <p><strong>CSV-Datei auswählen</strong><br>oder hierher ziehen</p>
  <p style="margin-top:8px;font-size:12px;color:#3a4039;">Erwartet: DATE + WEIGHT Spalten</p>
</div>

<div id="results">
  <div class="stats-row" id="statsRow"></div>
  <div class="trend-bar-wrap" id="trendWrap">
    <h3>Verlauf</h3>
    <div class="chart" id="chart"></div>
  </div>
  <p class="section-title">Kalenderwochen</p>
  <div class="week-list" id="weekList"></div>
</div>

<div class="empty" id="emptyMsg">Keine Daten gefunden.</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const results = document.getElementById('results');
const weekList = document.getElementById('weekList');
const statsRow = document.getElementById('statsRow');
const chartEl = document.getElementById('chart');
const emptyMsg = document.getElementById('emptyMsg');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function getISOWeekYear(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const year = d.getFullYear();
  const week1 = new Date(year, 0, 4);
  const kw = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  return { kw, year };
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file);
}

function parseCSVLine(line) {
  const cols = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  cols.push(cur);
  return cols;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]).map(h => h.trim().toUpperCase());
  const dateIdx = headers.indexOf('DATE');
  const weightIdx = headers.indexOf('WEIGHT');

  if (dateIdx === -1 || weightIdx === -1) {
    emptyMsg.style.display = 'block';
    emptyMsg.textContent = 'DATE oder WEIGHT Spalte nicht gefunden.';
    return;
  }

  const weekMap = new Map();

  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const rawDate = (cols[dateIdx] || '').trim();
    const rawWeight = (cols[weightIdx] || '').trim().replace(',', '.');
    if (!rawDate || !rawWeight) continue;
    const weight = parseFloat(rawWeight);
    if (isNaN(weight)) continue;
    const date = new Date(rawDate);
    if (isNaN(date.getTime())) continue;

    const { kw, year } = getISOWeekYear(date);
    const key = `${year}-${String(kw).padStart(2,'0')}`;

    if (!weekMap.has(key)) weekMap.set(key, { kw, year, values: [] });
    weekMap.get(key).values.push(weight);
  }

  if (weekMap.size === 0) {
    emptyMsg.style.display = 'block';
    return;
  }

  const weeks = [...weekMap.entries()]
    .sort((a, b) => b[0].localeCompare(a[0])) // newest first
    .map(([key, data]) => ({
      key, kw: data.kw, year: data.year,
      avg: data.values.reduce((s, v) => s + v, 0) / data.values.length,
      count: data.values.length
    }));

  // delta vs previous week
  for (let i = 0; i < weeks.length; i++) {
    if (i < weeks.length - 1) {
      weeks[i].delta = weeks[i].avg - weeks[i+1].avg;
    } else {
      weeks[i].delta = null;
    }
  }

  renderStats(weeks);
  renderChart([...weeks].reverse());
  renderWeeks(weeks);

  results.style.display = 'block';
  emptyMsg.style.display = 'none';
}

function fmt(val) {
  return val.toFixed(2).replace('.', ',');
}

function renderStats(weeks) {
  const allDeltas = weeks.filter(w => w.delta !== null).map(w => w.delta);
  const totalChange = weeks.length > 1 ? weeks[0].avg - weeks[weeks.length-1].avg : null;
  const latest = weeks[0].avg;
  const avgWeekly = allDeltas.length ? allDeltas.reduce((s,v) => s+v, 0) / allDeltas.length : null;

  statsRow.innerHTML = `
    <div class="stat-card">
      <div class="label">Aktuell</div>
      <div class="value neutral">${fmt(latest)}<span style="font-size:13px;color:var(--muted)"> kg</span></div>
    </div>
    <div class="stat-card">
      <div class="label">Ø Woche</div>
      <div class="value ${avgWeekly !== null ? (avgWeekly < 0 ? 'good' : '') : 'neutral'}">
        ${avgWeekly !== null ? (avgWeekly > 0 ? '+' : '') + fmt(avgWeekly) : '–'}
        <span style="font-size:13px;color:var(--muted)">${avgWeekly !== null ? ' kg' : ''}</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="label">Gesamt</div>
      <div class="value ${totalChange !== null ? (totalChange < 0 ? 'good' : '') : 'neutral'}">
        ${totalChange !== null ? (totalChange > 0 ? '+' : '') + fmt(totalChange) : '–'}
        <span style="font-size:13px;color:var(--muted)">${totalChange !== null ? ' kg' : ''}</span>
      </div>
    </div>
  `;
}

function renderChart(weeksAsc) {
  if (weeksAsc.length < 2) { document.getElementById('trendWrap').style.display = 'none'; return; }
  const min = Math.min(...weeksAsc.map(w => w.avg));
  const max = Math.max(...weeksAsc.map(w => w.avg));
  const range = max - min || 1;

  chartEl.innerHTML = weeksAsc.map(w => {
    const pct = Math.round(((w.avg - min) / range) * 100);
    return `
      <div class="chart-bar-wrap">
        <div class="chart-bar" style="height:${Math.max(pct, 5)}%"></div>
        <div class="chart-label">KW${w.kw}</div>
      </div>`;
  }).join('');
}

function renderWeeks(weeks) {
  weekList.innerHTML = '';
  weeks.forEach((w, i) => {
    const deltaClass = w.delta === null ? 'neutral' : (w.delta < 0 ? 'loss' : 'gain');
    const deltaStr = w.delta === null ? '–' : (w.delta > 0 ? '+' : '') + fmt(w.delta) + ' kg';

    const card = document.createElement('div');
    card.className = 'week-card';
    card.style.animationDelay = `${i * 40}ms`;
    card.innerHTML = `
      <div class="week-badge">
        <span class="kw-label">KW</span>
        <span class="kw-num">${w.kw}</span>
        <span class="kw-year">${w.year}</span>
      </div>
      <div class="week-info">
        <div class="avg-label">Ø GEWICHT</div>
        <div class="avg-value">${fmt(w.avg)} kg</div>
        <div class="days-count">${w.count} Messung${w.count !== 1 ? 'en' : ''}</div>
      </div>
      <div class="delta-badge ${deltaClass}">
        <span class="delta-label">vs. VW</span>
        <span class="delta-value">${deltaStr}</span>
      </div>
    `;
    weekList.appendChild(card);
  });
}
</script>
</body>
</html>
